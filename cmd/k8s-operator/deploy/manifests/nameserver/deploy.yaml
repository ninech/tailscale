apiVersion: apps/v1
kind: Deployment
metadata:
  name: nameserver 
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: nameserver
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: nameserver
    spec:
      containers:
      - imagePullPolicy: IfNotPresent
        name: nameserver
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - name: tcp
          protocol: TCP
          containerPort: 1053
        - name: udp
          protocol: UDP
          containerPort: 1053
        volumeMounts:
        - name: dnsrecords
          mountPath: /config
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: nameserver
      restartPolicy: Always
      serviceAccount: nameserver
      serviceAccountName: nameserver
      volumes:
      - name: dnsrecords
        configMap:
          name: dnsrecords
